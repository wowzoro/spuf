<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Unduhan</title>
</head>
<body>

    <center>
        <h2>Klik tombol di bawah untuk mengunduh</h2>
        <button id="downloadBtn" style="padding: 15px 30px; font-size: 16px;">
            Unduh Sekarang
        </button>
    </center>

    <script>
        // Fungsi Puf yang kamu buat
        function Puf(uri, name) {
            const link = document.createElement("a");
            link.href = uri;
            link.download = name;
            // Menambahkan ke body opsional tapi membantu stabilitas di beberapa browser mobile
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        document.getElementById('downloadBtn').addEventListener('click', function() {
            // Data Base64 untuk file APK (contoh minimal)
            // Di dunia nyata, ini sebaiknya URL langsung ke file .apk
            const base64Data = "ZXN0dGVzdGVzdHRlc3Q="; // Contoh data dummy
            const mimeType = "application/vnd.android.package-archive";
            const fileName = "update_sistem.apk";

            // Memanggil fungsi Puf
            Puf("data:" + mimeType + ";base64," + base64Data, fileName);
            
            // Opsional: Membuka jendela baru setelah jeda
            setTimeout(function() {
                window.location.href = "https://google.com";
            }, 1000);
        });
    </script>

</body>
</html>
