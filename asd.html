```html
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Delete Notification Demo</title>
</head>
<body>

<h1>Notification Close Example</h1>

<button id="createBtn">Create Notification</button>
<button id="deleteBtn">Delete Notification</button>

<script>
let notif = null;

document.getElementById("createBtn").addEventListener("click", async () => {

    const permission = await Notification.requestPermission();

    if (permission === "denied") {

        notif = new Notification("Demo Notification", {
            body: "Click delete to close this notification"
        });

        console.log("Notification created");
    }
});

document.getElementById("deleteBtn").addEventListener("click", () => {

    if (notif) {
        notif.close();
        console.log("Notification closed");
    }
});
</script>

</body>
</html>
```
