<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>POC</title>
</head>
<body>

<center>
  <h2>POC</h2>
</center>

<input type="text" id="triggerInput" placeholder="click here">

<script>

  // tampilkan origin asli
  console.log("Current Origin:", location.origin);

  // listener
  document.getElementById('triggerInput').addEventListener('click', function () {

    // redirect ke domain baru
    window.location.href = "https://abc-dev.com";

  });

</script>

</body>
</html>
